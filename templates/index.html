<!DOCTYPE html>
<html>
<head>
    <title>Quadratic Solver</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Quadratic Equation Solver</h2>

    <div class="card p-4 shadow">

        <div class="mb-3">
            <label>a:</label>
            <input type="number" id="a" class="form-control">
        </div>

        <div class="mb-3">
            <label>b:</label>
            <input type="number" id="b" class="form-control">
        </div>

        <div class="mb-3">
            <label>c:</label>
            <input type="number" id="c" class="form-control">
        </div>

        <button class="btn btn-primary" id="solveBtn">Solve</button>

    </div>

    <div class="mt-4" id="output"></div>

</div>


<script>
$("#solveBtn").click(function() {

    let a = $("#a").val();
    let b = $("#b").val();
    let c = $("#c").val();

    $.ajax({
        url: "/solve",
        type: "GET",
        data: { a: a, b: b, c: c },
        success: function(response) {

            $("#output").html(`
                <div class="alert alert-success">
                    <h5>${response.result.type}</h5>
                    <p>Root 1: ${response.result.root1}</p>
                    <p>Root 2: ${response.result.root2}</p>
                    <hr>
                    <p><b>Server IP:</b> ${response.server_ip}</p>
                </div>
            `);

        },
        error: function() {
            $("#output").html("<div class='alert alert-danger'>Error occurred</div>");
        }
    });

});
</script>

</body>
</html>
